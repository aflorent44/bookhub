<div class="filter-panel">
<!--<input [(ngModel)]="filters.title" placeholder="Title" />-->

<div class="author-row">
  <input [(ngModel)]="filters.authorFirstName" placeholder="Auteur (prénom)" />
  <input [(ngModel)]="filters.authorLastName" placeholder="Auteur (nom)" />
</div>
<input [(ngModel)]="filters.year" placeholder="Année" />
<input [(ngModel)]="filters.genre" placeholder="Genre" />
<input [(ngModel)]="filters.publisher" placeholder="Éditeur" />
<input [(ngModel)]="filters.countryName" placeholder="Pays" />
<input [(ngModel)]="filters.countryNationality" placeholder="Langue" />

  <app-button text="Filtrer" width="5rem" color="var(--txt-primary-hover)" (clicked)="applyFilters()"></app-button>
</div>
