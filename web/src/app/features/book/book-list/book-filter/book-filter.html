<div class="filter-panel">
  <div class="author-row">
    <input [(ngModel)]="localFilters.authorFirstName" placeholder="Auteur (prénom)" />
    <input [(ngModel)]="localFilters.authorLastName" placeholder="Auteur (nom)" />
  </div>

  <input [(ngModel)]="localFilters.year" placeholder="Année" />
  <input [(ngModel)]="localFilters.genre" placeholder="Genre" />
  <input [(ngModel)]="localFilters.publisher" placeholder="Éditeur" />
  <input [(ngModel)]="localFilters.countryName" placeholder="Pays" />
  <input [(ngModel)]="localFilters.countryNationality" placeholder="Langue" />

  <app-button
    text="Filtrer"
    width="5rem"
    color="var(--txt-primary-hover)"
    (clicked)="applyFilters()">
  </app-button>
</div>
